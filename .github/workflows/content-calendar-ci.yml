name: Content Calendar CI

# Runs the content-calendar test/typecheck/build pipeline on pull requests and
# pushes that touch the project (or the workflow itself).
on:
  push:
    branches: [main]
    paths:
      - 'content-calendar/**'
      - '.github/workflows/content-calendar-ci.yml'
  pull_request:
    paths:
      - 'content-calendar/**'
      - '.github/workflows/content-calendar-ci.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: content-calendar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-calendar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: content-calendar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
