name: Build desktop app

# Produces the downloadable, double-clickable installers (macOS .dmg,
# Windows .exe, Linux .AppImage). Run it from the Actions tab ("Run workflow"),
# or it runs automatically when a tag like v1.0.0 is pushed. The built apps are
# attached as downloadable artifacts on the run.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main
    # Only build when actual app source changes — not for README/docs/profile or
    # workflow edits. Keeps doc commits from triggering expensive desktop builds.
    paths:
      - 'content-calendar/**'
      - 'server/**'
      - 'desktop/**'

# The frontend is built with the API URL the desktop app serves on (must match
# PORT in desktop/src/main.ts).
env:
  VITE_API_URL: http://127.0.0.1:47615/api
  # Emit relative asset paths so the built index.html works when Electron loads
  # it via file:// (absolute "/assets" paths would 404 → blank window).
  VITE_DESKTOP: '1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build backend
        working-directory: server
        run: |
          npm ci
          npm run build
          npm prune --omit=dev --omit=optional

      - name: Build frontend
        working-directory: content-calendar
        run: |
          npm ci
          npm run build

      - name: Build & package desktop app
        working-directory: desktop
        run: |
          npm ci
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: forskai-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.AppImage
          if-no-files-found: ignore

  # Collect all three installers and publish them on a single, simple download
  # page (a GitHub Release) — direct download links, no .zip, no Actions maze.
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Publish download page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(installers/*/*.dmg installers/*/*.exe installers/*/*.AppImage)
          echo "Attaching: ${files[*]}"
          notes=$'Download the installer for your computer:\n\n- **Mac** -> the `.dmg` file\n- **Windows** -> the `.exe` file\n- **Linux** -> the `.AppImage` file\n\nFirst open on Mac: right-click the app -> Open -> Open.'
          # Idempotent: create the release if it doesn't exist yet, otherwise just
          # overwrite its installer assets. Avoids deleting/recreating the tag.
          if gh release view desktop-preview --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload desktop-preview "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create desktop-preview "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "forskAI desktop (preview)" \
              --notes "$notes"
          fi
